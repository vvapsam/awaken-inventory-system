<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>AWAKEN — Coach Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{--ink:#0F1115;--muted:#8A9099;--line:#E7EAEC;--paper:#EEF1F2;--white:#fff;--green:#18BE7C;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:Inter,system-ui,sans-serif;color:var(--ink);background:var(--paper);min-height:100vh}
h1{font-family:'Space Grotesk';margin:0;letter-spacing:-.01em}
.wrap{width:100%;max-width:460px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.hero{background:linear-gradient(150deg,#0b6b62,#0f9e91 60%,#18BE7C 130%);color:#fff;
  padding:calc(env(safe-area-inset-top,0px) + 22px) 20px 24px;border-radius:0 0 24px 24px}
.r1{display:flex;align-items:center;gap:10px}
.lg{font-family:'Space Grotesk';font-weight:800;letter-spacing:.18em;font-size:.78rem;opacity:.92}
.role{margin-left:auto;font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);padding:5px 11px;border-radius:999px}
.hero h1{font-size:1.5rem;margin-top:16px}
.hero p{color:rgba(255,255,255,.86);font-size:.9rem;margin:5px 0 0}
.pick{padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.gcard{background:var(--white);border-radius:18px;box-shadow:0 10px 24px rgba(11,26,23,.08);padding:18px 14px;text-align:center;text-decoration:none;color:inherit;display:block}
.gcard:active{transform:scale(.98)}
.gcard .emb{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.9rem;margin:0 auto 10px}
.gcard .nm{font-family:'Space Grotesk';font-weight:700;font-size:1rem;line-height:1.15}
.gcard .tag{display:inline-block;margin-top:5px;font-size:.62rem;font-weight:800;letter-spacing:.05em;padding:2px 9px;border-radius:6px;background:#eef1f2;color:#8a9099}
.foot{text-align:center;color:var(--muted);font-size:.82rem;padding:4px 20px 26px}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="r1"><span class="lg">AWAKEN</span><span class="role">Coach · Timer</span></div>
    <h1>Which group are you timing?</h1>
    <p>Tap your group to start.</p>
  </div>
  <div class="pick">
    {% for g in groups %}
    <a class="gcard" href="/coach/{{ g.id }}">
      <div class="emb" style="background:{{ g.color }}22;color:{{ g.color }}">{{ g.emblem }}</div>
      <div class="nm">{{ g.name }}</div>
      <div class="tag">Group {{ g.tag }}</div>
    </a>
    {% endfor %}
  </div>
  <div class="foot">You'll time all 9 stations for the group you pick.</div>
</div>
</body>
</html>
