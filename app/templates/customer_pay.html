{% extends "base.html" %}
{% block body %}
<h1>Record payment — {{ customer.name }}</h1>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<p class="muted">Current balance: <strong>{{ peso(balance) }}</strong></p>

<form method="post" action="/customer/{{ customer.id }}/pay" enctype="multipart/form-data" class="card">
  <label>Amount paid (₱)</label>
  <input name="amount" type="number" step="0.01" min="0" value="{{ '%.2f'|format(balance) if balance > 0 else '' }}" required autofocus>

  <label>Method</label>
  <select name="method">
    {% for m in PAYMENT_METHODS %}<option value="{{ m }}">{{ m }}</option>{% endfor %}
  </select>

  <label>Screenshot / proof of payment (optional)</label>
  <input name="screenshot" type="file" accept="image/*">

  <label>Note (optional)</label>
  <input name="note" placeholder="e.g. GCash ref 1234">

  <button type="submit" class="btn primary big">Save payment</button>
  <a class="btn" href="/customer/{{ customer.id }}">Cancel</a>
</form>
{% endblock %}
