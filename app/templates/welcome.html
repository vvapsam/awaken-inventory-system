<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Welcome to AWAKEN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{--ink:#0F1115;--muted:#8A9099;--line:#E9EBEE;--paper:#F4F6F7;--white:#fff;
  --green:#18BE7C;--green-d:#0FA268;--green-dk:#0B6B62;--teal:#0F9E91;}
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:Inter,system-ui,sans-serif;color:var(--ink);
  background:radial-gradient(1200px 600px at 50% -10%,#eef3f2,#e7ebec),linear-gradient(180deg,#eef1f2,#e6eaec);
  min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}
h1,h2,h3{font-family:Poppins,Inter,sans-serif;margin:0;letter-spacing:-.02em}
.wrap{width:100%;max-width:440px;margin:0 auto;flex:1;display:flex;flex-direction:column}
.hero{background:linear-gradient(160deg,#0b6b62 0%,#0f9e91 55%,#18BE7C 130%);color:#fff;
  padding:calc(46px + env(safe-area-inset-top)) 24px 54px;text-align:center;position:relative;flex:none}
.hero:after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:34px;background:var(--paper);border-radius:26px 26px 0 0}
.logoTile{display:inline-flex;align-items:center;justify-content:center;background:#fff;border-radius:14px;padding:9px 15px;box-shadow:0 8px 22px rgba(11,26,23,.2);min-height:56px}
.logoTile img{height:38px;width:auto;max-width:210px;display:block}
.logoTile b{font-family:Poppins;letter-spacing:.16em;color:#0b2a26;font-size:1.15rem}
.hero h1{font-size:1.7rem;margin-top:16px}
.hero p{color:rgba(255,255,255,.86);margin:7px 0 0;font-size:.95rem}
.body{margin-top:-24px;position:relative;z-index:3;padding:0 18px 26px;display:flex;flex-direction:column;gap:13px;flex:1;background:var(--paper)}
.opt{display:flex;align-items:center;gap:14px;background:#fff;border-radius:20px;box-shadow:0 12px 30px rgba(11,26,23,.1);padding:17px 16px;position:relative;text-align:left;
  color:inherit;text-decoration:none;border:0;width:100%;cursor:pointer;font:inherit;
  -webkit-tap-highlight-color:transparent;transition:transform .12s ease,box-shadow .12s ease}
.opt:active{transform:scale(.985);box-shadow:0 6px 18px rgba(11,26,23,.12)}
.opt .ic{width:52px;height:52px;border-radius:15px;display:flex;align-items:center;justify-content:center;flex:none}
.opt .ic svg{width:27px;height:27px;stroke-width:1.9}
.opt .tx{flex:1;min-width:0}
.opt .tx h3{font-size:1.16rem;font-weight:700}
.opt .tx p{margin:2px 0 0;color:var(--muted);font-size:.85rem}
.opt .arw{color:#c3c8ce;flex:none}.opt .arw svg{width:16px;height:16px;stroke-width:2.6}
/* featured cards — Walk-in (green) + Buy drinks (dark), the two live actions */
.opt.feature{padding:20px 18px;box-shadow:0 18px 40px rgba(11,26,23,.16)}
.opt.walkin{background:linear-gradient(150deg,#0b6b62 0%,#0f9e91 60%,#18BE7C 130%);color:#fff}
.opt.walkin h3{color:#fff;font-size:1.24rem}.opt.walkin p{color:rgba(255,255,255,.85)}
.opt.walkin .ic{background:rgba(255,255,255,.18);color:#fff}
.opt.walkin .arw{color:rgba(255,255,255,.8)}
.opt.buy{background:linear-gradient(135deg,#14171c,#242c34)}
.opt.buy h3{color:#fff;font-size:1.24rem}.opt.buy p{color:rgba(255,255,255,.72)}
.opt.buy .ic{background:linear-gradient(135deg,#18BE7C,#0F9E91);color:#fff}
.opt.buy .arw{color:rgba(255,255,255,.6)}
/* muted card — Sign up (coming soon) */
.opt.signup{opacity:.72;cursor:default}
.opt.signup .ic{background:#eef1f2;color:#98a0a8}
.opt.signup:active{transform:none;box-shadow:0 12px 30px rgba(11,26,23,.1)}
.tag{position:absolute;top:12px;right:14px;font-size:.64rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:3px 10px;border-radius:999px;line-height:1.2}
.tag.live{background:#e2f6ec;color:#0b8a4f}
.tag.soon{background:#fdf1de;color:#b5771b;border:1px solid #f2ddb4}
.opt.signup .tag.soon{background:rgba(255,255,255,.16);color:rgba(255,255,255,.75)}
.foot{text-align:center;color:var(--muted);font-size:.76rem;margin-top:auto;padding-top:12px}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(30px);background:#0F1115;color:#fff;
  padding:12px 18px;border-radius:12px;font-size:.86rem;font-weight:500;box-shadow:0 14px 34px rgba(0,0,0,.28);
  opacity:0;pointer-events:none;transition:opacity .22s ease,transform .22s ease;z-index:60;max-width:88%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="logoTile"><img src="/order-logo" alt="AWAKEN"
      onerror="this.style.display='none';this.parentNode.insertAdjacentHTML('beforeend','<b>AWAKEN</b>')"></div>
    <h1>Welcome to AWAKEN 👋</h1>
    <p>What would you like to do today?</p>
  </div>

  <div class="body">
    <a class="opt walkin feature" href="/kiosk/walkin">
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M9 20l-5.5-2.5a1 1 0 0 1-.5-1.3l3-7"/><path d="M14 4.5a2 2 0 1 0 0 .01"/><path d="M10 9l3-2 3 3 3 1"/><path d="M13 7l-2 5 3 2 1 6"/></svg></div>
      <div class="tx"><h3>Walk-in today</h3><p>Book your session — Open Gym, HYROX or private coaching</p></div>
      <div class="arw"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></div>
    </a>

    <a class="opt buy feature" href="/order">
      <span class="tag live">Live</span>
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg></div>
      <div class="tx"><h3>Buy drinks &amp; snacks</h3><p>Order &amp; pay from the menu</p></div>
      <div class="arw"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></div>
    </a>

    <button class="opt signup soon" type="button" data-soon="Membership sign-up is coming soon — please see the front desk.">
      <span class="tag soon">Soon</span>
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M22 11h-6"/></svg></div>
      <div class="tx"><h3>Sign up</h3><p>Become an AWAKEN member</p></div>
    </button>

    <div class="foot">AWAKEN Fitness Center</div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
var toast=document.getElementById('toast'),t=null;
document.querySelectorAll('.opt.soon').forEach(function(el){
  el.addEventListener('click',function(){
    toast.textContent=el.getAttribute('data-soon')||'Coming soon.';
    toast.classList.add('show');
    clearTimeout(t);t=setTimeout(function(){toast.classList.remove('show');},2600);
  });
});
</script>
</body>
</html>
