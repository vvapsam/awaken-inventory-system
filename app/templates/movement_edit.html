{% extends "base.html" %}
{% block body %}
<h1>Edit movement</h1>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<form method="post" action="/movement/{{ m.id }}/edit" class="card" style="max-width:560px">
  <div class="muted small">{{ m.movement_type }}</div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:6px">
    <div>
      <label>Date &amp; time</label>
      <input name="occurred_at" type="datetime-local" value="{{ dt_value }}">
    </div>
    <div>
      <label>Item</label>
      <select name="product_id">
        {% for p in products %}
        <option value="{{ p.id }}" {% if m.product and m.product.id == p.id %}selected{% endif %}>{{ p.name }}</option>
        {% endfor %}
      </select>
    </div>
  </div>

  {% if m.movement_type == 'adjustment' %}
  <label style="margin-top:12px">Direction</label>
  <select name="direction">
    <option value="add" {% if m.quantity >= 0 %}selected{% endif %}>Add to stock (+)</option>
    <option value="remove" {% if m.quantity < 0 %}selected{% endif %}>Remove from stock (−)</option>
  </select>
  {% else %}
  <input type="hidden" name="direction" value="{{ 'remove' if m.quantity < 0 else 'add' }}">
  {% endif %}

  <label style="margin-top:12px">Quantity</label>
  <input name="quantity" type="number" min="1" value="{{ m.quantity | abs }}" required>

  <label style="margin-top:12px">Amount / unit cost {% if m.movement_type != 'restock' %}(optional){% endif %}</label>
  <input name="unit_cost" type="number" step="0.01" min="0" value="{{ m.unit_cost if m.unit_cost is not none else '' }}" placeholder="—">

  <label style="margin-top:12px">Note</label>
  <input name="note" value="{{ m.note or '' }}">

  <div style="margin-top:16px">
    <button type="submit" class="btn primary big">Save</button>
    <a class="btn" href="/records">Cancel</a>
  </div>
</form>
{% endblock %}
