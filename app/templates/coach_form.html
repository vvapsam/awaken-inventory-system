{% extends "base.html" %}
{% block body %}
<h1>{{ 'Edit coach' if coach else 'New coach' }}</h1>
<form method="post" action="{{ '/coaches/%s/edit' % coach.id if coach else '/coaches/new' }}" class="card" style="max-width:560px">
  <label>Name</label>
  <input name="name" value="{{ coach.name if coach else '' }}" required autofocus>

  <label>Coach type</label>
  <select name="coach_type" id="ctype" onchange="togFee()">
    {% for val, lbl in coach_types %}
    <option value="{{ val }}" {% if coach and coach.coach_type==val %}selected{% endif %}>{{ lbl }}</option>
    {% endfor %}
  </select>

  <div id="feewrap">
    <label>Affiliate fee / month (₱)</label>
    <input name="affiliate_fee" type="number" step="0.01" min="0"
           value="{{ (coach.affiliate_fee if coach and coach.affiliate_fee is not none else '3000') }}"
           placeholder="e.g. 3000 or 2000">
  </div>

  <div class="two-col">
    <div>
      <label>Start / contract date</label>
      <input name="start_date" type="date" value="{{ coach.start_date if coach and coach.start_date else today }}">
    </div>
    <div>
      <label>Next billing date</label>
      <input name="next_billing" type="date" value="{{ coach.next_billing if coach and coach.next_billing else '' }}">
    </div>
  </div>

  <label class="check" style="margin-top:14px"><input type="checkbox" name="is_active" {% if (not coach) or coach.is_active %}checked{% endif %}> Active</label>

  <button type="submit" class="btn primary big">Save coach</button>
  <a class="btn" href="/coaches">Cancel</a>
</form>
<script>
function togFee(){ document.getElementById('feewrap').style.display = document.getElementById('ctype').value==='affiliate' ? 'block' : 'none'; }
togFee();
</script>
{% endblock %}
