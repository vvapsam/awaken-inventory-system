{% extends "base.html" %}
{% block body %}
<h1>Log a sale</h1>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<form method="post" action="/sale/new" class="card">
  <div id="rows">
    <div class="sale-row">
      <select name="product_id" class="prod">
        <option value="">— pick a product —</option>
        {% for p in products %}
        <option value="{{ p.id }}">{{ p.name }} ({{ peso(p.selling_price) }})</option>
        {% endfor %}
      </select>
      <input name="quantity" type="number" min="1" value="1" class="qty">
    </div>
  </div>
  <button type="button" class="btn" onclick="addRow()">＋ Add another item</button>

  <label>Customer (optional)</label>
  <input name="customer_name" list="customerlist" autocomplete="off"
         placeholder="type a name — new ones are added automatically">
  <datalist id="customerlist">
    {% for c in customers %}<option value="{{ c.name }}">{% endfor %}
  </datalist>

  <label class="check" style="margin-top:14px">
    <input type="checkbox" name="is_credit" id="is_credit" onchange="toggleCredit()">
    <span>Unpaid — put on this customer's balance (credit / utang)</span>
  </label>

  <div id="paymethod-wrap">
    <label>Payment method</label>
    <select name="payment_method">
      {% for m in PAYMENT_METHODS %}<option value="{{ m }}">{{ m }}</option>{% endfor %}
    </select>
  </div>

  <label>Note (optional)</label>
  <input name="note" placeholder="e.g. table 4">

  <button type="submit" class="btn primary big">Save sale</button>
</form>
<script>
function toggleCredit(){
  var credit = document.getElementById('is_credit').checked;
  document.getElementById('paymethod-wrap').style.display = credit ? 'none' : 'block';
}
</script>

<template id="rowtpl">
  <div class="sale-row">
    <select name="product_id" class="prod">
      <option value="">— pick a product —</option>
      {% for p in products %}
      <option value="{{ p.id }}">{{ p.name }} ({{ peso(p.selling_price) }})</option>
      {% endfor %}
    </select>
    <input name="quantity" type="number" min="1" value="1" class="qty">
  </div>
</template>
<script>
function addRow(){
  var t = document.getElementById('rowtpl');
  document.getElementById('rows').appendChild(t.content.cloneNode(true));
}
</script>
{% endblock %}
